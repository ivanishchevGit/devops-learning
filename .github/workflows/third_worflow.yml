name: Second Workflow
on: push
jobs:
  run-first-command:
    runs-on: ubuntu-latest
    steps:
      - name: List files and copy Repo
        run: ls -a
      #- uses: actions/checkout@v7
      - name: Copy our files
        run: |
          git init
          git remote add origin "https://@GITHUB_ACTOR:${{secrets.GITHUB_TOKEN}}github.com/$GITHUB_REPOSITORY.git"
          git fetch origin
          git checkout main
      - name: List files
        run: ls -a