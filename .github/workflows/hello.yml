name: Hello Pipeline
on: [push]
jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run hello script
        run: bash hello.sh
  show-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Print current directory
        run: pwd
      - name: List files
        run: ls -la
